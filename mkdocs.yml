site_name: Agent Loop Guard
site_description: Local safety, observability, evaluation, and isolation toolkit for coding agents.
site_url: https://rimumurudev.github.io/agent-loop-guard/
repo_url: https://github.com/RIMUMURUDEV/agent-loop-guard
repo_name: RIMUMURUDEV/agent-loop-guard
edit_uri: edit/main/docs/
copyright: Copyright &copy; Agent Loop Guard contributors. Apache-2.0.

theme:
  name: material
  language: en
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Five-minute quickstart: getting-started/quickstart.md
      - Connect an agent: getting-started/agent-setup.md
      - Configuration: getting-started/configuration.md
  - Guides:
      - Loop Guard: guides/guard.md
      - Agent Playground: guides/playground.md
      - IssuePilot: guides/issuepilot.md
      - ReproLab: guides/reprolab.md
      - MCP Permission Firewall: guides/mcp-firewall.md
      - Session Replay: guides/replay.md
      - Benchmark Lab: guides/benchmark.md
      - Sandbox Preview: guides/sandbox.md
      - VS Code extension: guides/vscode.md
      - Operations and data: guides/operations.md
  - Reference:
      - CLI: reference/cli.md
      - HTTP API: reference/api.md
      - MCP policy format: reference/mcp-policy.md
      - Event and trace schemas: reference/events.md
  - Internals:
      - Architecture: architecture.md
      - Threat model: security.md
      - Project status: status.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Release process: development/releasing.md
      - Troubleshooting: troubleshooting.md
  - Русский: ru/index.md
